name: ci

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/macos/**
      - .github/workflows/ci.yml
      - .github/workflows/release-macos.yml
  workflow_call:
    inputs:
      checkout_ref:
        description: 要验证的分支、提交或标签
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Frontend and Rust verification
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: true
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Enable package.json pnpm version
        working-directory: apps/macos
        run: |
          corepack enable
          corepack install
          test "$(pnpm --version)" = "11.5.2"

      - name: Install frontend dependencies
        working-directory: apps/macos
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: apps/macos
        run: pnpm lint

      - name: Test frontend
        working-directory: apps/macos
        run: pnpm test

      - name: Build frontend
        working-directory: apps/macos
        run: pnpm build

      - name: Audit frontend dependencies
        working-directory: apps/macos
        run: pnpm audit --audit-level high

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check Rust formatting
        working-directory: apps/macos/src-tauri
        run: cargo fmt --all -- --check

      - name: Check Rust targets
        working-directory: apps/macos/src-tauri
        run: cargo check --locked --all-targets --all-features

      - name: Test Rust targets
        working-directory: apps/macos/src-tauri
        run: cargo test --locked --all-targets --all-features

      - name: Lint Rust targets
        working-directory: apps/macos/src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: apps/macos/src-tauri
        run: cargo audit
