name: release-macos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_tag:
        description: 可选，仅重新打包并上传已有 app-vX.Y.Z 标签
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  verify:
    name: 发版前验证
    uses: ./.github/workflows/ci.yml
    with:
      checkout_ref: ${{ inputs.rebuild_tag || github.sha }}

  release:
    name: 计算并创建版本
    needs: verify
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/macos
    outputs:
      published: ${{ steps.recovery.outputs.published || steps.semantic.outputs.published }}
      tag: ${{ steps.recovery.outputs.tag || steps.semantic.outputs.tag }}
      version: ${{ steps.recovery.outputs.version || steps.semantic.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.rebuild_tag || github.sha }}

      - name: Validate recovery tag
        id: recovery
        if: github.event_name == 'workflow_dispatch' && inputs.rebuild_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REBUILD_TAG: ${{ inputs.rebuild_tag }}
        run: |
          if [[ ! "$REBUILD_TAG" =~ ^app-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "无效标签：$REBUILD_TAG" >&2
            exit 1
          fi
          git rev-parse --verify "refs/tags/$REBUILD_TAG^{commit}" >/dev/null
          gh release view "$REBUILD_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "tag=$REBUILD_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${REBUILD_TAG#app-v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.recovery.outcome == 'skipped'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Enable pnpm
        if: steps.recovery.outcome == 'skipped'
        run: |
          corepack enable
          corepack install
          test "$(pnpm --version)" = "11.5.2"

      - name: Install Rust stable
        if: steps.recovery.outcome == 'skipped'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      - name: Install release dependencies
        if: steps.recovery.outcome == 'skipped'
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        if: steps.recovery.outcome == 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "published=false" >> "$GITHUB_OUTPUT"
          BEFORE_TAG="$(git tag --list 'app-v*' --sort=-version:refname | head -n 1)"
          pnpm exec semantic-release
          git fetch --force --tags origin
          AFTER_TAG="$(git tag --list 'app-v*' --sort=-version:refname | head -n 1)"
          if [[ -n "$AFTER_TAG" && "$AFTER_TAG" != "$BEFORE_TAG" ]]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$AFTER_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#app-v}" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    name: 打包 macOS ${{ matrix.label }}
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Enable pnpm
        working-directory: apps/macos
        run: |
          corepack enable
          corepack install
          test "$(pnpm --version)" = "11.5.2"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/macos/src-tauri -> target

      - name: Install dependencies
        working-directory: apps/macos
        run: pnpm install --frozen-lockfile

      - name: Build and upload macOS release assets
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/macos
          tagName: ${{ needs.release.outputs.tag }}
          releaseDraft: ${{ inputs.rebuild_tag == '' }}
          prerelease: false
          args: --target ${{ matrix.target }} --bundles app,dmg

  finalize-release:
    name: 发布完整 macOS 稳定版
    needs: [release, build-and-release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Normalize updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          WORKDIR="$(mktemp -d)"
          MANIFEST="$WORKDIR/latest.json"
          NORMALIZED_MANIFEST="$WORKDIR/latest.normalized.json"
          RELEASE_JSON="$WORKDIR/release.json"

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern latest.json --dir "$WORKDIR"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets,body > "$RELEASE_JSON"
          jq \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg tag "$TAG" \
            --slurpfile release "$RELEASE_JSON" '
            ($release[0].assets
              | map({
                  key: .apiUrl,
                  value: (
                    "https://github.com/\($repository)/releases/download/\($tag)/\(.name | @uri)"
                  )
                })
              | from_entries) as $downloads
            | .notes = ($release[0].body // .notes)
            | .platforms |= with_entries(
                .value.url = (
                  $downloads[.value.url]
                  // error("缺少更新包的直接下载地址：\(.value.url)")
                )
              )
          ' "$MANIFEST" > "$NORMALIZED_MANIFEST"
          mv "$NORMALIZED_MANIFEST" "$MANIFEST"

          jq -e --arg tag "$TAG" '
            .version == ($tag | ltrimstr("app-v")) and
            (.platforms | length >= 2) and
            all(
              .platforms[];
              (.signature | length) > 0 and
              (.url | startswith("https://github.com/") and contains("/releases/download/"))
            )
          ' "$MANIFEST" >/dev/null
          gh release upload "$TAG" "$MANIFEST" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish verified draft release
        if: >-
          github.event_name != 'workflow_dispatch' || inputs.rebuild_tag == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          test "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = "false"
