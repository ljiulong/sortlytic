name: release-macos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_tag:
        description: 可选，仅重新打包并上传已有 app-vX.Y.Z 标签
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  verify:
    name: 发版前验证
    uses: ./.github/workflows/ci.yml
    with:
      checkout_ref: ${{ inputs.rebuild_tag || github.sha }}

  release:
    name: 计算并创建版本
    needs: verify
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/macos
    outputs:
      published: ${{ steps.recovery.outputs.published || steps.semantic.outputs.published }}
      tag: ${{ steps.recovery.outputs.tag || steps.semantic.outputs.tag }}
      version: ${{ steps.recovery.outputs.version || steps.semantic.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.rebuild_tag || github.sha }}

      - name: Validate recovery tag
        id: recovery
        if: github.event_name == 'workflow_dispatch' && inputs.rebuild_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REBUILD_TAG: ${{ inputs.rebuild_tag }}
        run: |
          if [[ ! "$REBUILD_TAG" =~ ^app-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "无效标签：$REBUILD_TAG" >&2
            exit 1
          fi
          git rev-parse --verify "refs/tags/$REBUILD_TAG^{commit}" >/dev/null
          gh release view "$REBUILD_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "tag=$REBUILD_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${REBUILD_TAG#app-v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.recovery.outcome == 'skipped'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        if: steps.recovery.outcome == 'skipped'
        run: |
          corepack enable
          corepack install
          test "$(pnpm --version)" = "11.5.2"

      - name: Install Rust stable
        if: steps.recovery.outcome == 'skipped'
        uses: dtolnay/rust-toolchain@stable

      - name: Install release dependencies
        if: steps.recovery.outcome == 'skipped'
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        if: steps.recovery.outcome == 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "published=false" >> "$GITHUB_OUTPUT"
          BEFORE_TAG="$(git tag --list 'app-v*' --sort=-version:refname | head -n 1)"
          pnpm exec semantic-release
          git fetch --force --tags origin
          AFTER_TAG="$(git tag --list 'app-v*' --sort=-version:refname | head -n 1)"
          if [[ -n "$AFTER_TAG" && "$AFTER_TAG" != "$BEFORE_TAG" ]]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$AFTER_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#app-v}" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    name: 打包 macOS ${{ matrix.label }}
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        working-directory: apps/macos
        run: |
          corepack enable
          corepack install
          test "$(pnpm --version)" = "11.5.2"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/macos/src-tauri -> target

      - name: Install dependencies
        working-directory: apps/macos
        run: pnpm install --frozen-lockfile

      - name: Build and upload macOS release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/macos
          tagName: ${{ needs.release.outputs.tag }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles app,dmg
