name: release-macos

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 自动递增版号
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  prepare-release:
    name: 准备版本
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/macos
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Bump and sync version
        id: version
        run: |
          npm version "${{ inputs.version_bump }}" --no-git-tag-version
          node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const confPath='src-tauri/tauri.conf.json';const conf=JSON.parse(fs.readFileSync(confPath,'utf8'));conf.version=pkg.version;fs.writeFileSync(confPath,JSON.stringify(conf,null,2)+'\n');const cargoPath='src-tauri/Cargo.toml';const cargo=fs.readFileSync(cargoPath,'utf8').replace(/^(version\s*=\s*)\"[^\"]+\"/m,(_,prefix)=>prefix+'\"'+pkg.version+'\"');fs.writeFileSync(cargoPath,cargo);"
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release v$VERSION"
          git push origin HEAD:${{ github.ref_name }}
          git tag "app-v$VERSION"
          git push origin "app-v$VERSION"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: 打包 macOS ${{ matrix.label }}
    needs: prepare-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm
        working-directory: apps/macos
        run: |
          corepack enable
          corepack install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/macos/src-tauri -> target

      - name: Install dependencies
        working-directory: apps/macos
        run: pnpm install --frozen-lockfile

      - name: Build and publish macOS release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/macos
          tagName: app-v${{ needs.prepare-release.outputs.version }}
          releaseName: Sortlytic v${{ needs.prepare-release.outputs.version }}
          releaseBody: 本次自动发版只打包 macOS 客户端，包含 Apple Silicon 与 Intel 架构产物。
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles app,dmg
